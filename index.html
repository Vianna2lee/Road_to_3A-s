async function loadAll(){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/revision_data?id=eq.main&select=data`,{headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}});
    const rows=await r.json();
    return(rows&&rows[0]&&rows[0].data)?rows[0].data:{};
  }catch(e){return{};}
}
async function saveAll(data){
  try{
    await fetch(`${SUPA_URL}/rest/v1/revision_data?id=eq.main`,{method:"PATCH",headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({data,updated_at:new Date().toISOString()})});

}
