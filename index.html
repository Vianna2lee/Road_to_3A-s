<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A* Revision Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #1a1a18; font-size: 13px; }
input, select, textarea, button { font-family: inherit; font-size: 12px; }
button { cursor: pointer; }
.tab-bar { display: flex; gap: 2px; padding: 12px 16px 0; border-bottom: 1px solid #e8e8e4; }
.tab-btn { padding: 6px 14px; border-radius: 6px 6px 0 0; border: 1px solid transparent; background: transparent; color: #6b6b68; margin-bottom: -1px; }
.tab-btn.active { border-color: #d4d4d0; border-bottom-color: #fff; background: #fff; color: #1a1a18; font-weight: 500; }
.content { padding: 16px; }
.chip { padding: 3px 10px; border-radius: 6px; border: 1px solid #e8e8e4; background: transparent; color: #6b6b68; font-size: 11px; }
.chip.active { border-color: #85B7EB; background: #E6F1FB; color: #0C447C; }
.row-header { display: flex; align-items: center; gap: 8px; padding: 9px 14px; cursor: pointer; user-select: none; }
.year-block { border: 1px solid #e8e8e4; border-radius: 10px; margin-bottom: 6px; overflow: hidden; }
.year-block.done { border-color: #5DCAA5; }
.year-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: #fff; cursor: pointer; user-select: none; }
.paper-row { border-top: 1px solid #e8e8e4; }
.paper-header { display: flex; align-items: center; gap: 8px; padding: 9px 14px; cursor: pointer; background: #fff; }
.paper-header:hover { background: #f7f7f5; }
.paper-body { padding: 14px; background: #f7f7f5; border-top: 1px solid #e8e8e4; display: none; }
.paper-body.open { display: block; }
input[type=number], input[type=date], input[type=text], select, textarea {
  width: 100%; padding: 7px 10px; border-radius: 7px; border: 1px solid #d4d4d0; background: #fff; color: #1a1a18;
}
textarea { resize: vertical; min-height: 70px; }
.bar-bg { height: 7px; border-radius: 4px; background: #e8e8e4; overflow: hidden; margin-bottom: 8px; }
.bar-fill { height: 100%; border-radius: 4px; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 5px; border: 1px solid; display: inline-block; }
.subtab-bar { display: flex; border-bottom: 1px solid #e8e8e4; margin-bottom: 10px; }
.subtab-btn { padding: 5px 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #6b6b68; font-size: 11px; }
.subtab-btn.active { border-bottom-color: #185FA5; color: #0C447C; }
.weak-row { background: #fff; border: 1px solid #AFA9EC; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.weak-row.done { border-color: #e8e8e4; opacity: 0.5; }
.empty-box { padding: 32px; text-align: center; color: #6b6b68; border: 1px solid #e8e8e4; border-radius: 12px; }
.add-modal { background: #fff; border: 1px solid #85B7EB; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
label.lbl { font-size: 11px; color: #6b6b68; display: block; margin-bottom: 4px; }
.btn-green { padding: 6px 16px; border-radius: 7px; border: none; background: #0F6E56; color: #fff; }
.btn-green:disabled { background: #ccc; cursor: default; }
.btn-grey { padding: 6px 16px; border-radius: 7px; border: 1px solid #e8e8e4; background: transparent; color: #6b6b68; }
.insights-card { background: #fff; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; border: 1px solid #e8e8e4; }
.filter-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
</style>
</head>
<body>
<div id="app">
  <div style="padding:16px 16px 0">
    <div style="font-size:17px;font-weight:500">A* Revision Hub</div>
    <div style="font-size:11px;color:#6b6b68">Edexcel Maths &amp; Further Maths · OCR CS H446 · Summer 2026</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">Past Papers</button>
    <button class="tab-btn" onclick="switchTab(1)">Weak Topics</button>
  </div>
  <div class="content">
    <div id="tab0"></div>
    <div id="tab1" style="display:none"></div>
  </div>
</div>

<script>
const SUPA_URL = "https://wwcwiobbetizfbqwufvt.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y3dpb2JiZXRpemZicXd1ZnZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDAxOTEsImV4cCI6MjA5MDM3NjE5MX0.ma4_zIE5MVnFN38B4QLoz6bzpQSsaZbH-WAwo7lNDv4";

const PB = {
  "Maths":{
    "Paper 1 (Pure)":{2024:{as:81,a:66,b:53,max:100},2023:{as:82,a:67,b:54,max:100},2022:{as:70,a:53,b:42,max:100},2019:{as:null,a:59,b:47,max:100}},
    "Paper 2 (Pure)":{2024:{as:81,a:65,b:53,max:100},2023:{as:80,a:63,b:51,max:100},2022:{as:73,a:55,b:43,max:100},2019:{as:null,a:54,b:43,max:100}},
    "Paper 3 (Stats & Mech)":{2024:{as:89,a:74,b:60,max:100},2023:{as:82,a:66,b:53,max:100},2022:{as:74,a:56,b:44,max:100},2019:{as:null,a:52,b:44,max:100}},
  },
  "Further Maths":{
    "Core Pure 1":{2024:{as:67,a:60,b:51,max:75},2023:{as:51,a:43,b:35,max:75},2022:{as:65,a:54,b:43,max:75},2019:{as:60,a:50,b:41,max:75}},
    "Core Pure 2":{2024:{as:63,a:56,b:48,max:75},2023:{as:56,a:46,b:38,max:75},2022:{as:59,a:49,b:39,max:75},2019:{as:60,a:51,b:41,max:75}},
    "Further Mech 1":{2024:{as:68,a:61,b:51,max:75},2023:{as:60,a:52,b:43,max:75},2022:{as:55,a:46,b:38,max:75},2019:{as:63,a:53,b:44,max:75}},
    "Further Stats 1":{2024:{as:56,a:48,b:40,max:75},2023:{as:60,a:53,b:43,max:75},2022:{as:59,a:49,b:39,max:75},2019:{as:67,a:56,b:47,max:75}},
  },
  "Computer Science":{
    "H446/01 Computer Systems":{2024:{as:107,a:93,b:78,max:140},2023:{as:100,a:87,b:72,max:140},2022:{as:88,a:76,b:62,max:140},2019:{as:108,a:94,b:79,max:140}},
    "H446/02 Algorithms & Programming":{2024:{as:112,a:97,b:81,max:140},2023:{as:104,a:90,b:74,max:140},2022:{as:93,a:80,b:65,max:140},2019:{as:112,a:97,b:82,max:140}},
  }
};
const B25 = {
  "Maths":{"Paper 1 (Pure)":{as:88,a:74,b:61,max:100},"Paper 2 (Pure)":{as:83,a:67,b:55,max:100},"Paper 3 (Stats & Mech)":{as:87,a:73,b:61,max:100}},
  "Further Maths":{"Core Pure 1":{as:62,a:53,b:45,max:75},"Core Pure 2":{as:70,a:61,b:52,max:75},"Further Mech 1":{as:58,a:51,b:44,max:75},"Further Stats 1":{as:54,a:50,b:43,max:75}},
  "Computer Science":{"H446/01 Computer Systems":{as:112,a:99,b:84,max:140},"H446/02 Algorithms & Programming":{as:116,a:101,b:85,max:140}}
};
const ALB = {
  "Maths":{2025:{as:258,a:214,b:178,max:300},2024:{as:251,a:205,b:167,max:300},2023:{as:244,a:196,b:158,max:300},2022:{as:217,a:164,b:130,max:300},2019:{as:217,a:165,b:134,max:300}},
  "Further Maths":{2025:{as:262,a:233,b:199,max:300},2024:{as:256,a:226,b:192,max:300},2023:{as:224,a:189,b:158,max:300},2022:{as:239,a:201,b:167,max:300},2019:{as:239,a:201,b:167,max:300}},
  "Computer Science":{2025:{as:291,a:256,b:218,max:350},2024:{as:291,a:256,b:218,max:350},2023:{as:286,a:251,b:209,max:350},2022:{as:264,a:229,b:189,max:350},2019:{as:285,a:250,b:212,max:350}}
};
const BASE_PAPERS = [
  ...[2024,2023,2022,2019].flatMap(y=>["Paper 1 (Pure)","Paper 2 (Pure)","Paper 3 (Stats & Mech)"].map((p,i)=>({id:"m_"+y+"_"+i,subject:"Maths",paper:p,year:String(y),pmtUrl:"https://www.physicsandmathstutor.com/maths-revision/a-level-edexcel/papers/"}))),
  ...[2024,2023,2022,2019].flatMap(y=>["Core Pure 1","Core Pure 2","Further Mech 1","Further Stats 1"].map((p,i)=>({id:"fm_"+y+"_"+i,subject:"Further Maths",paper:p,year:String(y),pmtUrl:"https://www.physicsandmathstutor.com/maths-revision/a-level-edexcel/papers-further/"}))),
  ...[2024,2023,2022,2019].flatMap(y=>["H446/01 Computer Systems","H446/02 Algorithms & Programming"].map((p,i)=>({id:"cs_"+y+"_"+i,subject:"Computer Science",paper:p,year:String(y),pmtUrl:"https://www.physicsandmathstutor.com/a-level-computer-science/ocr/past-papers/"})))
];

// STATE
let state = { paperData:{}, doneTopics:{}, customPapers:[] };
let currentTab = 0;
let ppFilter = "All";
let saveTimer = null;

function getBoundary(subject, paper, year) {
  return ((PB[subject]||{})[paper]||{})[parseInt(year)] || null;
}
function gradeLabel(score, b) {
  if (!b) return null;
  const s = parseInt(score);
  if (isNaN(s)) return null;
  if (b.as && s >= b.as) return {label:"A*", c:"#0F6E56"};
  if (s >= b.a) return {label:"A", c:"#185FA5"};
  if (s >= b.b) return {label:"B", c:"#854F0B"};
  return {label:"C/below", c:"#A32D2D"};
}
function pct(score, max) { return Math.round(parseInt(score)/max*100); }

async function loadData() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/revision_data?id=eq.main&select=data`, {
      headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}
    });
    if (!res.ok) { console.error("Load failed:", res.status); return; }
    const rows = await res.json();
    console.log("Loaded rows:", JSON.stringify(rows).slice(0,200));
    if (rows && rows.length > 0) {
      const d = rows[0].data;
      console.log("Data keys:", d ? Object.keys(d) : "null");
      if (d && d.paperData) state.paperData = d.paperData;
      if (d && d.doneTopics) state.doneTopics = d.doneTopics;
      if (d && d.doneTasks) state.doneTopics = d.doneTasks; // backwards compat with old key name
      if (d && d.customPapers) state.customPapers = d.customPapers;
    }
  } catch(e) { console.error("Load error:", e); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try {
      await fetch(`${SUPA_URL}/rest/v1/revision_data`, {
        method:"POST",
        headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates,return=minimal"},
        body: JSON.stringify({id:"main", data:state, updated_at:new Date().toISOString()})
      });
    } catch(e) {}
  }, 1000);
}

function switchTab(n) {
  currentTab = n;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  document.getElementById('tab0').style.display = n===0?'block':'none';
  document.getElementById('tab1').style.display = n===1?'block':'none';
  if (n===0) renderPapers();
  if (n===1) renderWeak();
}

function allPapers() { return [...BASE_PAPERS, ...state.customPapers]; }

// ── PAPERS TAB ──────────────────────────────────────────
function renderPapers() {
  const el = document.getElementById('tab0');
  const papers = ppFilter==="All" ? allPapers() : allPapers().filter(p=>p.subject===ppFilter);

  let html = `<div class="filter-row">`;
  ["All","Maths","Further Maths","Computer Science"].forEach(f=>{
    html += `<button class="chip${ppFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`;
  });
  html += `<button onclick="toggleAddModal()" style="margin-left:auto;font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid #185FA5;background:#E6F1FB;color:#0C447C">+ Add paper</button></div>`;
  html += `<div id="add-modal-slot"></div>`;

  if (ppFilter === "All") {
    html += renderInsights(papers);
  } else {
    const years = [...new Set(papers.map(p=>p.year))].sort((a,b)=>b-a);
    html += `<div style="font-size:13px;font-weight:500;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e8e8e4">${ppFilter}</div>`;
    years.forEach(y=>{
      const yp = papers.filter(p=>p.year===y);
      html += renderYearBlock(y, yp, ppFilter);
    });
  }

  el.innerHTML = html;
}

function renderInsights(papers) {
  const done = papers.filter(p=>state.paperData[p.id]?.grade);
  if (!done.length) return `<div class="empty-box">No results yet — select a subject, open a year, and enter your score.</div>`;

  const gc = l=>l==="A*"?"#0F6E56":l==="A"?"#185FA5":l==="B"?"#854F0B":"#A32D2D";
  let html = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">`;
  ["A*","A","B","C/below"].forEach(g=>{
    const n = done.filter(p=>gradeLabel(state.paperData[p.id].grade, p.customBoundary||getBoundary(p.subject,p.paper,p.year))?.label===g).length;
    if (n) html += `<div style="padding:6px 14px;border-radius:10px;background:${gc(g)}18;border:1px solid ${gc(g)};color:${gc(g)};font-size:12px;font-weight:500">${g}: ${n}</div>`;
  });
  html += `<div style="padding:6px 14px;border-radius:10px;background:#f7f7f5;border:1px solid #e8e8e4;color:#6b6b68;font-size:12px">${done.length}/${papers.length} done</div></div>`;

  const bySubj = {};
  done.forEach(p=>{ if(!bySubj[p.subject]) bySubj[p.subject]=[]; bySubj[p.subject].push(p); });
  Object.entries(bySubj).forEach(([subj,ps])=>{
    html += `<div style="font-size:12px;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e8e8e4">${subj}</div>`;
    ps.forEach(p=>{
      const d=state.paperData[p.id]; const sc=parseInt(d.grade);
      const b=p.customBoundary||getBoundary(p.subject,p.paper,p.year);
      const b2=((B25[p.subject]||{})[p.paper])||null;
      const gl=gradeLabel(sc,b); const g2=gradeLabel(sc,b2);
      const sp=b?pct(sc,b.max):null; const col=gl?gl.c:"#B4B2A9";
      const gapAs=b&&b.as&&sc<b.as?b.as-sc:null;
      const gap25=b2&&sc<b2.as?b2.as-sc:null;
      html += `<div class="insights-card" style="border-color:${gl?gl.c+'66':'#e8e8e4'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
          <div><span style="font-size:12px;font-weight:500">${p.displayPaper||p.paper}</span>
          <span style="font-size:11px;color:#6b6b68;margin-left:8px">${p.year}</span>
          ${d.dateDone?`<span style="font-size:10px;color:#9b9b98;margin-left:8px">${d.dateDone}</span>`:''}
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            <span style="font-size:13px;font-weight:600;color:${col}">${d.grade}/${b?b.max:'?'} (${sp}%)</span>
            ${gl?`<span class="badge" style="color:${col};background:${col}22;border-color:${col}">${gl.label}</span>`:''}
          </div>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(sp,100)}%;background:${col}"></div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:10px">
          ${gapAs?`<span style="color:#A32D2D">+${gapAs} needed for ${p.year} A*</span>`:''}
          ${g2?`<span style="color:${g2.c};padding:1px 6px;border-radius:4px;background:${g2.c}18;border:1px solid ${g2.c}55">2025: ${g2.label}</span>`:''}
          ${gap25?`<span style="color:#854F0B">+${gap25} for 2025 A*</span>`:''}
          ${!gap25&&b2&&sc>=b2.as?`<span style="color:#0F6E56">Meets 2025 A*</span>`:''}
          ${d.wrongTopics?`<span style="color:#6b6b68;padding:1px 6px;border-radius:4px;background:#f7f7f5">Errors logged</span>`:''}
        </div>
      </div>`;
    });
  });

  const errPapers = done.filter(p=>state.paperData[p.id]?.wrongTopics);
  if (errPapers.length) {
    html += `<div style="margin-top:4px;padding:12px 14px;border-radius:10px;background:#f7f7f5;border:1px solid #e8e8e4">
      <div style="font-size:12px;font-weight:600;margin-bottom:8px">Logged error topics</div>`;
    errPapers.forEach(p=>{
      html += `<div style="font-size:11px;color:#6b6b68;margin-bottom:4px"><span style="font-weight:500;color:#1a1a18">${p.subject} ${p.paper} ${p.year}: </span>${state.paperData[p.id].wrongTopics}</div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderYearBlock(year, papers, subject) {
  const alb = ((ALB[subject])||{})[parseInt(year)];
  const allDone = papers.length>0 && papers.every(p=>state.paperData[p.id]?.grade);
  const bid = `yb_${subject.replace(/\s/g,'_')}_${year}`;
  let html = `<div class="year-block${allDone?' done':''}" id="${bid}">
    <div class="year-header" onclick="toggleYear('${bid}')">
      <div style="display:flex;align-items:center;gap:8px">
        ${allDone?'<span style="color:#0F6E56;font-size:14px">✓</span>':''}
        <span style="font-size:13px;font-weight:500">${year}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${alb?`<span style="font-size:10px;color:#6b6b68">A*:${alb.as} A:${alb.a} B:${alb.b} /${alb.max}</span>`:''}
        <span style="font-size:10px;color:#6b6b68" id="${bid}_arrow">▼</span>
      </div>
    </div>
    <div id="${bid}_body" style="display:none">`;
  papers.forEach(p=>{ html += renderPaperRow(p); });
  html += `</div></div>`;
  return html;
}

function renderPaperRow(p) {
  const d = state.paperData[p.id]||{};
  const b = p.customBoundary||getBoundary(p.subject,p.paper,p.year);
  const sc = d.grade?parseInt(d.grade):null;
  const gl = gradeLabel(sc,b);
  const sp = (sc!==null&&b)?pct(sc,b.max):null;
  const col = gl?gl.c:"#B4B2A9";
  const pid = p.id;
  return `<div class="paper-row">
    <div class="paper-header" onclick="togglePaper('${pid}')">
      <span style="font-size:12px;flex:1">${p.displayPaper||p.paper}</span>
      ${sc!==null?`<span style="font-size:11px;font-weight:500;color:${col}">${d.grade}/${b?b.max:'?'} (${sp}%) ${gl?'· '+gl.label:''}</span>`:'<span style="font-size:10px;color:#9b9b98;font-style:italic">not done</span>'}
      ${p.pmtUrl?`<a href="${p.pmtUrl}" target="_blank" style="font-size:10px;color:#185FA5;text-decoration:none" onclick="event.stopPropagation()">PMT</a>`:''}
      <span style="font-size:10px;color:#6b6b68" id="${pid}_arrow">▼</span>
      ${p.id.startsWith('custom_')?`<button onclick="event.stopPropagation();removePaper('${pid}')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #F09595;background:transparent;color:#A32D2D">✕</button>`:''}
    </div>
    <div class="paper-body" id="${pid}_body">
      <div class="grid2" style="margin-bottom:12px">
        <div><label class="lbl">Score /${b?b.max:100}</label>
          <input type="number" min="0" max="${b?b.max:999}" value="${d.grade||''}" placeholder="e.g. 78" onchange="updateField('${pid}','grade',this.value)"/></div>
        <div><label class="lbl">Date done</label>
          <input type="date" value="${d.dateDone||''}" onchange="updateField('${pid}','dateDone',this.value)"/></div>
      </div>
      ${sc!==null&&b?renderBoundaryInfo(p,d,sc,b,sp,col):''}
      <div class="subtab-bar">
        <button class="subtab-btn active" id="${pid}_st0" onclick="switchSubtab('${pid}',0)">Topics Wrong</button>
        <button class="subtab-btn" id="${pid}_st1" onclick="switchSubtab('${pid}',1)">Notes</button>
      </div>
      <div id="${pid}_wrong"><textarea placeholder="e.g. circle theorems, integration by parts..." onchange="updateField('${pid}','wrongTopics',this.value)">${d.wrongTopics||''}</textarea></div>
      <div id="${pid}_notes" style="display:none"><textarea placeholder="Notes about this paper..." onchange="updateField('${pid}','notes',this.value)">${d.notes||''}</textarea></div>
    </div>
  </div>`;
}

function renderBoundaryInfo(p,d,sc,b,sp,col) {
  const b25 = ((B25[p.subject]||{})[p.paper])||null;
  let html = `<div style="margin-bottom:12px">
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(sp,100)}%;background:${col}"></div></div>
    <div style="font-size:11px;color:#6b6b68;margin-bottom:5px">${p.year} boundaries${b.as===null?" (no A* published)":""}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">`;
  [{l:"A*",v:b.as,c:"#0F6E56"},{l:"A",v:b.a,c:"#185FA5"},{l:"B",v:b.b,c:"#854F0B"}].forEach(({l,v,c})=>{
    if(v===null) return;
    const met=sc>=v;
    html+=`<span class="badge" style="color:${met?c:'#6b6b68'};background:${met?c+'22':'#fff'};border-color:${met?c:'#e8e8e4'}">${l} ${v}/${b.max} (${pct(v,b.max)}%) ${met?'✓':''}</span>`;
  });
  html += `</div>`;
  if (b25) {
    html += `<div style="font-size:11px;color:#6b6b68;margin-bottom:5px">vs 2025 boundaries</div><div style="display:flex;gap:5px;flex-wrap:wrap">`;
    [{l:"A*",v:b25.as,c:"#0F6E56"},{l:"A",v:b25.a,c:"#185FA5"},{l:"B",v:b25.b,c:"#854F0B"}].forEach(({l,v,c})=>{
      const met=sc>=v;
      html+=`<span class="badge" style="color:${met?c:'#6b6b68'};background:${met?c+'22':'#fff'};border-color:${met?c:'#e8e8e4'}">${l} ${v}/${b25.max} (${pct(v,b25.max)}%) ${met?'✓':''}</span>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function toggleYear(bid) {
  const body = document.getElementById(bid+'_body');
  const arrow = document.getElementById(bid+'_arrow');
  const open = body.style.display==='block';
  body.style.display = open?'none':'block';
  if(arrow) arrow.textContent = open?'▼':'▲';
}

function togglePaper(pid) {
  const body = document.getElementById(pid+'_body');
  const arrow = document.getElementById(pid+'_arrow');
  if (!body) return;
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  if(arrow) arrow.textContent = open?'▼':'▲';
}

function switchSubtab(pid, n) {
  document.getElementById(pid+'_wrong').style.display = n===0?'block':'none';
  document.getElementById(pid+'_notes').style.display = n===1?'block':'none';
  document.getElementById(pid+'_st0').classList.toggle('active',n===0);
  document.getElementById(pid+'_st1').classList.toggle('active',n===1);
}

function updateField(pid, key, val) {
  if (!state.paperData[pid]) state.paperData[pid] = {};
  state.paperData[pid][key] = val;
  scheduleSave();
  // re-render header score without full re-render
  renderPapers();
}

function setFilter(f) {
  ppFilter = f;
  renderPapers();
}

let addModalOpen = false;
function toggleAddModal() {
  addModalOpen = !addModalOpen;
  const slot = document.getElementById('add-modal-slot');
  if (!slot) return;
  if (addModalOpen) {
    slot.innerHTML = renderAddModal();
  } else {
    slot.innerHTML = '';
  }
}

function renderAddModal() {
  return `<div class="add-modal">
    <div style="font-size:13px;font-weight:500;margin-bottom:12px">Add a custom paper</div>
    <div class="grid2" style="margin-bottom:12px">
      <div><label class="lbl">Subject</label>
        <select id="am_subj" onchange="amSubjChange()">
          <option>Maths</option><option>Further Maths</option><option>Computer Science</option>
        </select></div>
      <div><label class="lbl">Paper</label>
        <select id="am_paper">
          <option value="">Select...</option>
          <option>Paper 1 (Pure)</option><option>Paper 2 (Pure)</option><option>Paper 3 (Stats & Mech)</option><option>Other</option>
        </select></div>
      <div><label class="lbl">Year</label><input type="text" id="am_year" placeholder="e.g. 2019"/></div>
      <div><label class="lbl">Total marks</label><input type="number" id="am_max" placeholder="e.g. 75"/></div>
      <div style="grid-column:1/-1"><label class="lbl">Label <span style="color:#9b9b98;font-weight:400">(optional — e.g. AQA Further Stats)</span></label>
        <input type="text" id="am_label" placeholder="e.g. AQA Further Stats 2019"/></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="chip active" id="am_b25btn" onclick="amBoundaryToggle(false)">Use 2025 (if available)</button>
      <button class="chip" id="am_bcustbtn" onclick="amBoundaryToggle(true)">Enter manually</button>
    </div>
    <div id="am_bcust" style="display:none;margin-bottom:12px">
      <div class="grid2" style="grid-template-columns:1fr 1fr 1fr">
        <div><label class="lbl">A*</label><input type="number" id="am_bAs" placeholder="A*"/></div>
        <div><label class="lbl">A</label><input type="number" id="am_bA" placeholder="A"/></div>
        <div><label class="lbl">B</label><input type="number" id="am_bB" placeholder="B"/></div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-green" onclick="submitAddModal()">Add Paper</button>
      <button class="btn-grey" onclick="toggleAddModal()">Cancel</button>
    </div>
  </div>`;
}

let amUseCustomBoundary = false;
function amBoundaryToggle(custom) {
  amUseCustomBoundary = custom;
  document.getElementById('am_b25btn').classList.toggle('active',!custom);
  document.getElementById('am_bcustbtn').classList.toggle('active',custom);
  document.getElementById('am_bcust').style.display = custom?'block':'none';
}
function amSubjChange() {
  const s = document.getElementById('am_subj').value;
  const sel = document.getElementById('am_paper');
  const opts = {
    "Maths":["Paper 1 (Pure)","Paper 2 (Pure)","Paper 3 (Stats & Mech)","Other"],
    "Further Maths":["Core Pure 1","Core Pure 2","Further Mech 1","Further Stats 1","Other"],
    "Computer Science":["H446/01 Computer Systems","H446/02 Algorithms & Programming","Other"]
  };
  sel.innerHTML = '<option value="">Select...</option>' + (opts[s]||[]).map(o=>`<option>${o}</option>`).join('');
}
function submitAddModal() {
  const subj = document.getElementById('am_subj').value;
  const paper = document.getElementById('am_paper').value;
  const year = document.getElementById('am_year').value.trim();
  const maxM = document.getElementById('am_max').value;
  const label = document.getElementById('am_label').value.trim();
  if (!paper||!year||!maxM) return alert('Please fill in Paper, Year and Total marks');
  const maxN = parseInt(maxM);
  const b25ref = ((B25[subj]||{})[paper])||null;
  let cb;
  if (amUseCustomBoundary) {
    cb = {as:parseInt(document.getElementById('am_bAs').value)||null, a:parseInt(document.getElementById('am_bA').value)||0, b:parseInt(document.getElementById('am_bB').value)||0, max:maxN};
  } else if (b25ref) {
    cb = {as:b25ref.as?Math.round(b25ref.as/b25ref.max*maxN):null, a:Math.round(b25ref.a/b25ref.max*maxN), b:Math.round(b25ref.b/b25ref.max*maxN), max:maxN};
  } else {
    cb = {as:null,a:null,b:null,max:maxN};
  }
  const finalPaper = paper==="Other"?(label||"Other"):paper;
  const displayPaper = (paper!=="Other"&&label)?`${paper} (${label})`:finalPaper;
  state.customPapers.push({id:"custom_"+Date.now(), subject:subj, paper:finalPaper, displayPaper, year, customBoundary:cb, pmtUrl:""});
  scheduleSave();
  addModalOpen = false;
  renderPapers();
}
function removePaper(pid) {
  state.customPapers = state.customPapers.filter(p=>p.id!==pid);
  scheduleSave();
  renderPapers();
}

// ── WEAK TOPICS TAB ──────────────────────────────────────
function renderWeak() {
  const el = document.getElementById('tab1');
  const rows = [];
  allPapers().forEach(p=>{
    const d = state.paperData[p.id];
    if (!d?.wrongTopics?.trim()) return;
    d.wrongTopics.split(/,|;|\n/).map(t=>t.trim()).filter(Boolean).forEach(name=>{
      rows.push({id:p.id+"_"+name, name:name.charAt(0).toUpperCase()+name.slice(1), paper:p.paper, year:p.year, subject:p.subject});
    });
  });
  if (!rows.length) {
    el.innerHTML = `<div class="empty-box">No weak topics yet. In Past Papers, open a paper and type topics you got wrong.</div>`;
    return;
  }
  let html = `<div style="font-size:11px;color:#6b6b68;margin-bottom:10px">${rows.length} topic${rows.length!==1?'s':''} logged</div>`;
  rows.forEach(t=>{
    const done = !!state.doneTopics[t.id];
    html += `<div class="weak-row${done?' done':''}">
      <input type="checkbox" ${done?'checked':''} onchange="toggleTopic('${t.id}',this.checked)"/>
      <span style="font-size:13px;font-weight:500;text-decoration:${done?'line-through':'none'};flex:1">${t.name}</span>
      <span style="font-size:10px;color:#6b6b68">${t.subject} · ${t.paper} ${t.year}</span>
    </div>`;
  });
  el.innerHTML = html;
}

function toggleTopic(id, checked) {
  state.doneTopics[id] = checked;
  scheduleSave();
  renderWeak();
}

// ── INIT ─────────────────────────────────────────────────
loadData().then(()=>{
  renderPapers();
}).catch(()=>{
  renderPapers();
});
</script>
