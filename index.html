async function loadAll() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/revision_data?id=eq.main&select=data`, {
      headers: {"apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`}
    });
    const rows = await res.json();
    return (rows && rows[0] && rows[0].data) ? rows[0].data : {};
  } catch(e) { return {}; }
}

async function saveAll(data) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/revision_data?id=eq.main`, {
      method: "PATCH",
      headers: {"apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal"},
      body: JSON.stringify({data, updated_at: new Date().toISOString()})
    });
  } catch(e) {}
}

function getBoundary(subject, paper, year) {
  return ((PB[subject]||{})[paper]||{})[parseInt(year)] || null;
}
function gradeLabel(score, b) {
  if (!b) return null;
  const s = parseInt(score);
  if (isNaN(s)) return null;
  if (b.as && s >= b.as) return {label:"A*", c:"#0F6E56"};
  if (s >= b.a) return {label:"A", c:"#185FA5"};
  if (s >= b.b) return {label:"B", c:"#854F0B"};
  return {label:"C/below", c:"#A32D2D"};
}
function pct(score, max) { return Math.round(parseInt(score)/max*100); }

const IS = {width:"100%",fontSize:12,padding:"7px 10px",borderRadius:7,border:"0.5px solid #d4d4d0",background:"#ffffff",color:"#1a1a18",boxSizing:"border-box"};

function PaperRow({p, data, onChange, onRemove}) {
  const [open, setOpen] = useState(false);
  const [subtab, setSubtab] = useState("wrong");
  const d = data || {};
  const upd = (k, v) => onChange(p.id, {...d, [k]: v});
  const b   = p.customBoundary || getBoundary(p.subject, p.paper, p.year);
  const b25 = ((B25[p.subject]||{})[p.paper]) || null;
  const sc  = d.grade ? parseInt(d.grade) : null;
  const gl  = gradeLabel(sc, b);
  const sp  = (sc !== null && b) ? pct(sc, b.max) : null;
  const col = gl ? gl.c : "#B4B2A9";
  const TS  = {...IS, fontSize:12, minHeight:70, resize:"vertical"};

  return (
    <div style={{borderTop:"0.5px solid #e8e8e4"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",cursor:"pointer",background:open?"#f7f7f5":"transparent",userSelect:"none"}} onClick={()=>setOpen(o=>!o)}>
        <span style={{fontSize:12,flex:1}}>{p.paper}</span>
        {sc !== null
          ? <span style={{fontSize:11,fontWeight:500,color:col}}>{d.grade}/{b?b.max:"?"} ({sp}%) {gl?"· "+gl.label:""}</span>
          : <span style={{fontSize:10,color:"#9b9b98",fontStyle:"italic"}}>not done</span>}
        {p.pmtUrl && <a href={p.pmtUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#185FA5",textDecoration:"none"}} onClick={e=>e.stopPropagation()}>PMT</a>}
        <span style={{fontSize:10,color:"#6b6b68"}}>{open?"▲":"▼"}</span>
        {p.id.startsWith("custom_") && (
          <button onClick={e=>{e.stopPropagation();onRemove(p.id);}} style={{fontSize:10,padding:"2px 7px",borderRadius:5,border:"0.5px solid #F09595",background:"transparent",color:"#A32D2D",cursor:"pointer"}}>✕</button>
        )}
      </div>
      {open && (
        <div style={{padding:"14px",background:"#f7f7f5",borderTop:"0.5px solid #e8e8e4"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <label style={{fontSize:11,color:"#6b6b68",display:"block",marginBottom:4}}>Score /{b?b.max:100}</label>
              <input type="number" min="0" max={b?b.max:999} style={IS} placeholder="e.g. 78" value={d.grade||""} onChange={e=>upd("grade",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:11,color:"#6b6b68",display:"block",marginBottom:4}}>Date done</label>
              <input type="date" style={IS} value={d.dateDone||""} onChange={e=>upd("dateDone",e.target.value)}/>
            </div>
          </div>
          {sc !== null && b && (
            <div style={{marginBottom:12}}>
              <div style={{height:7,borderRadius:4,background:"#e8e8e4",overflow:"hidden",marginBottom:8}}>
                <div style={{height:"100%",width:Math.min(sp,100)+"%",background:col,borderRadius:4}}/>
              </div>
              <div style={{fontSize:11,color:"#6b6b68",marginBottom:5}}>{p.year} boundaries{b.as===null?" (no A* published)":""}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                {[{l:"A*",v:b.as,c:"#0F6E56"},{l:"A",v:b.a,c:"#185FA5"},{l:"B",v:b.b,c:"#854F0B"}].map(({l,v,c})=>{
                  if(v===null) return null;
                  const met=sc>=v;
                  return <span key={l} style={{fontSize:10,padding:"2px 8px",borderRadius:5,color:met?c:"#6b6b68",background:met?c+"22":"#ffffff",border:"0.5px solid "+(met?c:"#e8e8e4")}}>{l} {v}/{b.max} ({pct(v,b.max)}%) {met?"✓":""}</span>;
                })}
              </div>
              {b25 && <>
                <div style={{fontSize:11,color:"#6b6b68",marginBottom:5}}>vs 2025 boundaries</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {[{l:"A*",v:b25.as,c:"#0F6E56"},{l:"A",v:b25.a,c:"#185FA5"},{l:"B",v:b25.b,c:"#854F0B"}].map(({l,v,c})=>{
                    const met=sc>=v;
                    return <span key={l} style={{fontSize:10,padding:"2px 8px",borderRadius:5,color:met?c:"#6b6b68",background:met?c+"22":"#ffffff",border:"0.5px solid "+(met?c:"#e8e8e4")}}>{l} {v}/{b25.max} ({pct(v,b25.max)}%) {met?"✓":""}</span>;
                  })}
                </div>
              </>}
            </div>
          )}
          <div style={{display:"flex",borderBottom:"0.5px solid #e8e8e4",marginBottom:10}}>
            {["wrong","notes"].map(t=>(
              <button key={t} onClick={()=>setSubtab(t)} style={{fontSize:11,padding:"5px 14px",background:"transparent",border:"none",borderBottom:subtab===t?"2px solid #185FA5":"2px solid transparent",color:subtab===t?"#0C447C":"#6b6b68",cursor:"pointer"}}>
                {t==="wrong"?"Topics Wrong":"Notes"}
              </button>
            ))}
          </div>
          {subtab==="wrong" && <textarea style={TS} placeholder="e.g. circle theorems, integration by parts..." value={d.wrongTopics||""} onChange={e=>upd("wrongTopics",e.target.value)}/>}
          {subtab==="notes" && <textarea style={TS} placeholder="Notes about this paper..." value={d.notes||""} onChange={e=>upd("notes",e.target.value)}/>}
        </div>
      )}
    </div>
  );
}

function YearBlock({year, papers, subject, paperData, onChange, onRemove}) {
  const [open, setOpen] = useState(false);
  const alb = ((ALB[subject])||{})[parseInt(year)];
  const allDone = papers.length > 0 && papers.every(p => paperData[p.id]?.grade);
  return (
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",borderRadius:open?"10px 10px 0 0":10,border:"0.5px solid "+(allDone?"#5DCAA5":"#e8e8e4"),background:open?"#f7f7f5":"#ffffff",cursor:"pointer",userSelect:"none"}} onClick={()=>setOpen(o=>!o)}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {allDone && <span style={{color:"#0F6E56",fontSize:14}}>✓</span>}
          <span style={{fontSize:13,fontWeight:500}}>{year}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {alb && <span style={{fontSize:10,color:"#6b6b68"}}>A*:{alb.as} A:{alb.a} B:{alb.b} /{alb.max}</span>}
          <span style={{fontSize:10,color:"#6b6b68"}}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open && (
        <div style={{border:"0.5px solid #e8e8e4",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
          {papers.map(p=><PaperRow key={p.id} p={p} data={paperData[p.id]} onChange={onChange} onRemove={onRemove}/>)}
        </div>
      )}
    </div>
  );
}

function AllInsights({allPapers, paperData}) {
  const done = allPapers.filter(p=>paperData[p.id]?.grade);
  if (!done.length) return (
    <div style={{padding:"32px",textAlign:"center",color:"#6b6b68",fontSize:13,border:"0.5px solid #e8e8e4",borderRadius:12}}>
      No results yet — go to a subject tab, open a year, and enter your score.
    </div>
  );
  const gc = l=>l==="A*"?"#0F6E56":l==="A"?"#185FA5":l==="B"?"#854F0B":"#A32D2D";
  const bySubj = {};
  done.forEach(p=>{if(!bySubj[p.subject])bySubj[p.subject]=[];bySubj[p.subject].push(p);});
  return (
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {["A*","A","B","C/below"].map(g=>{
          const n=done.filter(p=>gradeLabel(paperData[p.id].grade,p.customBoundary||getBoundary(p.subject,p.paper,p.year))?.label===g).length;
          return n>0?<div key={g} style={{padding:"6px 14px",borderRadius:10,background:gc(g)+"18",border:"0.5px solid "+gc(g),color:gc(g),fontSize:12,fontWeight:500}}>{g}: {n}</div>:null;
        })}
        <div style={{padding:"6px 14px",borderRadius:10,background:"#f7f7f5",border:"0.5px solid #e8e8e4",color:"#6b6b68",fontSize:12}}>{done.length}/{allPapers.length} done</div>
      </div>
      {Object.entries(bySubj).map(([subj,papers])=>(
        <div key={subj} style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:8,paddingBottom:4,borderBottom:"0.5px solid #e8e8e4"}}>{subj}</div>
          {papers.map(p=>{
            const d=paperData[p.id]; const sc=parseInt(d.grade);
            const b=p.customBoundary||getBoundary(p.subject,p.paper,p.year);
            const b2=((B25[p.subject]||{})[p.paper])||null;
            const gl=gradeLabel(sc,b); const g2=gradeLabel(sc,b2);
            const sp=b?pct(sc,b.max):null; const col=gl?gl.c:"#B4B2A9";
            const gapAs=b&&b.as&&sc<b.as?b.as-sc:null;
            const gap25=b2&&sc<b2.as?b2.as-sc:null;
            return (
              <div key={p.id} style={{background:"#ffffff",border:"0.5px solid "+(gl?gl.c+"66":"#e8e8e4"),borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                  <div>
                    <span style={{fontSize:12,fontWeight:500}}>{p.paper}</span>
                    <span style={{fontSize:11,color:"#6b6b68",marginLeft:8}}>{p.year}</span>
                    {d.dateDone&&<span style={{fontSize:10,color:"#9b9b98",marginLeft:8}}>{d.dateDone}</span>}
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    <span style={{fontSize:13,fontWeight:600,color:col}}>{d.grade}/{b?b.max:"?"} ({sp}%)</span>
                    {gl&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:5,background:col+"22",border:"0.5px solid "+col,color:col,fontWeight:500}}>{gl.label}</span>}
                  </div>
                </div>
                <div style={{height:6,borderRadius:3,background:"#e8e8e4",overflow:"hidden",marginBottom:6}}>
                  <div style={{height:"100%",width:Math.min(sp,100)+"%",background:col,borderRadius:3}}/>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:10}}>
                  {gapAs&&<span style={{color:"#A32D2D"}}>+{gapAs} needed for {p.year} A*</span>}
                  {g2&&<span style={{color:g2.c,padding:"1px 6px",borderRadius:4,background:g2.c+"18",border:"0.5px solid "+g2.c+"55"}}>2025: {g2.label}</span>}
                  {gap25&&<span style={{color:"#854F0B"}}>+{gap25} for 2025 A*</span>}
                  {!gap25&&b2&&sc>=b2.as&&<span style={{color:"#0F6E56"}}>Meets 2025 A*</span>}
                  {d.wrongTopics&&<span style={{color:"#6b6b68",padding:"1px 6px",borderRadius:4,background:"#f7f7f5"}}>Errors logged</span>}
                </div>
              </div>
            );
          })}
        </div>
      ))}
      {done.some(p=>paperData[p.id]?.wrongTopics)&&(
        <div style={{marginTop:4,padding:"12px 14px",borderRadius:10,background:"#f7f7f5",border:"0.5px solid #e8e8e4"}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Logged error topics</div>
          {done.filter(p=>paperData[p.id]?.wrongTopics).map(p=>(
            <div key={p.id} style={{fontSize:11,color:"#6b6b68",marginBottom:4}}>
              <span style={{fontWeight:500,color:"#1a1a18"}}>{p.subject} {p.paper} {p.year}: </span>{paperData[p.id].wrongTopics}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AddPaperModal({onAdd, onClose}) {
  const [subject,setSubject]=useState("Maths");
  const [paper,setPaper]=useState("");
  const [year,setYear]=useState("");
  const [maxMarks,setMaxMarks]=useState("");
  const [useCustom,setUseCustom]=useState(false);
  const [bAs,setBAs]=useState(""); const [bA,setBA]=useState(""); const [bB,setBB]=useState("");
  const [customName,setCustomName]=useState("");
  const paperOpts={"Maths":["Paper 1 (Pure)","Paper 2 (Pure)","Paper 3 (Stats & Mech)","Other"],"Further Maths":["Core Pure 1","Core Pure 2","Further Mech 1","Further Stats 1","Other"],"Computer Science":["H446/01 Computer Systems","H446/02 Algorithms & Programming","Other"]};
  const b25ref=((B25[subject]||{})[paper])||null;
  const maxN=parseInt(maxMarks)||0;
  const finalPaper = paper==="Other" ? (customName.trim()||"Other") : paper;
  function handleAdd() {
    if(!paper||!year.trim()||!maxMarks) return;
    let cb;
    if(useCustom){cb={as:bAs?parseInt(bAs):null,a:parseInt(bA)||0,b:parseInt(bB)||0,max:maxN};}
    else if(b25ref){cb={as:b25ref.as?Math.round(b25ref.as/b25ref.max*maxN):null,a:Math.round(b25ref.a/b25ref.max*maxN),b:Math.round(b25ref.b/b25ref.max*maxN),max:maxN};}
    else{cb={as:null,a:null,b:null,max:maxN};}
    onAdd({id:"custom_"+Date.now(),subject,paper:finalPaper,year:year.trim(),customBoundary:cb,pmtUrl:""});
    onClose();
  }
  return (
    <div style={{background:"#ffffff",border:"0.5px solid #85B7EB",borderRadius:12,padding:"16px",marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Add a custom paper</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div><label style={{fontSize:11,color:"#6b6b68",display:"block",marginBottom:4}}>Subject</label>
          <select style={IS} value={subject} onChange={e=>{setSubject(e.target.value);setPaper("");}}>
            {["Maths","Further Maths","Computer Science"].map(o=><option key={o}>{o}</option>)}
          </select></div>
        <div><label style={{fontSize:11,color:"#6b6b68",display:"block",marginBottom:4}}>Paper</label>
          <select style={IS} value={paper} onChange={e=>{setPaper(e.target.value);setCustomName("");}}>
            <option value="">Select...</option>
            {(paperOpts[subject]||[]).map(o=><option key={o}>{o}</option>)}
          </select>
          {paper==="Other"&&<input style={{...IS,marginTop:6}} placeholder="Custom name (optional, e.g. PMT Paper 1)" value={customName} onChange={e=>setCustomName(e.target.value)}/>}
        </div>
        <div><label style={{fontSize:11,color:"#6b6b68",display:"block",marginBottom:4}}>Year</label>
          <input style={IS} placeholder="e.g. 2025" value={year} onChange={e=>setYear(e.target.value)}/></div>
        <div><label style={{fontSize:11,color:"#6b6b68",display:"block",marginBottom:4}}>Total marks</label>
          <input type="number" style={IS} placeholder="e.g. 100" value={maxMarks} onChange={e=>setMaxMarks(e.target.value)}/></div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"#6b6b68",marginBottom:6}}>Grade boundaries</div>
        <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
          <button onClick={()=>setUseCustom(false)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"0.5px solid "+(!useCustom?"#185FA5":"#e8e8e4"),background:!useCustom?"#E6F1FB":"transparent",color:!useCustom?"#0C447C":"#6b6b68",cursor:"pointer"}}>
            Use 2025 {b25ref?"(A*"+b25ref.as+" A"+b25ref.a+" B"+b25ref.b+"/"+b25ref.max+")":"(if available)"}
          </button>
          <button onClick={()=>setUseCustom(true)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"0.5px solid "+(useCustom?"#185FA5":"#e8e8e4"),background:useCustom?"#E6F1FB":"transparent",color:useCustom?"#0C447C":"#6b6b68",cursor:"pointer"}}>Enter manually</button>
        </div>
        {!useCustom&&b25ref&&maxN>0&&<div style={{fontSize:10,color:"#6b6b68",padding:"6px 10px",background:"#f7f7f5",borderRadius:6}}>Scaled to /{maxN}: A* {Math.round(b25ref.as/b25ref.max*maxN)}, A {Math.round(b25ref.a/b25ref.max*maxN)}, B {Math.round(b25ref.b/b25ref.max*maxN)}</div>}
        {useCustom&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          {[["A*",bAs,setBAs],["A",bA,setBA],["B",bB,setBB]].map(([l,v,s])=>(
            <div key={l}><label style={{fontSize:10,color:"#6b6b68",display:"block",marginBottom:3}}>{l}</label>
              <input type="number" style={IS} placeholder={l} value={v} onChange={e=>s(e.target.value)}/></div>
          ))}</div>}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={handleAdd} disabled={!paper||!year||!maxMarks} style={{fontSize:12,padding:"6px 16px",borderRadius:7,border:"none",background:!paper||!year||!maxMarks?"#ccc":"#0F6E56",color:"white",cursor:!paper||!year||!maxMarks?"default":"pointer"}}>Add Paper</button>
        <button onClick={onClose} style={{fontSize:12,padding:"6px 16px",borderRadius:7,border:"0.5px solid #e8e8e4",background:"transparent",color:"#6b6b68",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  );
}

function App() {
  const [ready,setReady]=useState(false);
  const [tab,setTab]=useState(0);
  const [paperData,setPaperData]=useState({});
  const [doneTasks,setDoneTasks]=useState({});
  const [doneTopics,setDoneTopics]=useState({});
  const [customPapers,setCustomPapers]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [ppFilter,setPpFilter]=useState("All");

  useEffect(()=>{
    loadAll().then(saved=>{
      if(saved.paperData) setPaperData(saved.paperData);
      if(saved.doneTasks) setDoneTasks(saved.doneTasks);
      if(saved.doneTopics) setDoneTopics(saved.doneTopics);
      if(saved.customPapers) setCustomPapers(saved.customPapers);
      setReady(true);
    });
  },[]);

  useEffect(()=>{
    if(!ready) return;
    saveAll({paperData,doneTasks,doneTopics,customPapers});
  },[paperData,doneTasks,doneTopics,customPapers,ready]);

  const updatePaper=useCallback((id,data)=>setPaperData(prev=>({...prev,[id]:data})),[]);
  const removePaper=useCallback(id=>setCustomPapers(prev=>prev.filter(p=>p.id!==id)),[]);
  const allPapers=[...BASE_PAPERS,...customPapers];
  const filtered=ppFilter==="All"?allPapers:allPapers.filter(p=>p.subject===ppFilter);

  const weakRows=[];
  allPapers.forEach(p=>{
    const d=paperData[p.id];
    if(!d?.wrongTopics?.trim()) return;
    d.wrongTopics.split(/,|;|\n/).map(t=>t.trim()).filter(Boolean).forEach(name=>{
      weakRows.push({id:p.id+"_"+name,name:name.charAt(0).toUpperCase()+name.slice(1),paper:p.paper,year:p.year,subject:p.subject});
    });
  });

  const Chip=({label,active,onClick})=>(
    <button onClick={onClick} style={{fontSize:11,padding:"3px 10px",borderRadius:6,border:"0.5px solid "+(active?"#85B7EB":"#e8e8e4"),background:active?"#E6F1FB":"transparent",color:active?"#0C447C":"#6b6b68",cursor:"pointer"}}>{label}</button>
  );

  if(!ready) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"200px",color:"#6b6b68",fontSize:13}}>Loading your saved data...</div>;

  return (
    <div style={{fontFamily:"var(--font-sans)",maxWidth:920,margin:"0 auto"}}>
      <div style={{padding:"1rem 1rem 0"}}>
        <div style={{fontSize:17,fontWeight:500}}>A* Revision Hub</div>
        <div style={{fontSize:11,color:"#6b6b68"}}>Edexcel Maths &amp; Further Maths (FM1+FS1) · OCR CS H446 · Summer 2026 · Synced to cloud</div>
      </div>
      <div style={{display:"flex",gap:2,padding:"0.75rem 1rem 0",borderBottom:"0.5px solid #e8e8e4",overflowX:"auto"}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{fontSize:12,fontWeight:tab===i?500:400,padding:"6px 13px",borderRadius:"6px 6px 0 0",border:"0.5px solid",borderBottom:tab===i?"none":"transparent",cursor:"pointer",whiteSpace:"nowrap",background:tab===i?"#ffffff":"transparent",borderColor:tab===i?"#d4d4d0":"transparent",color:tab===i?"#1a1a18":"#6b6b68",marginBottom:tab===i?-1:0}}>{t}</button>
        ))}
      </div>
      <div style={{padding:"1rem"}}>

        {tab===0&&(
          <div>
            <div style={{fontSize:11,color:"#6b6b68",marginBottom:12}}>9:00 start daily · Tue 1 Apr + Sat tutoring · Sat only from week 2</div>
            {Object.entries(TT).map(([day,blocks])=>{
              const isTutor=day.includes("tutor");
              const doneCount=blocks.filter((_,i)=>doneTasks[day+"-"+i]).length;
              return (
                <div key={day} style={{background:"#ffffff",border:"0.5px solid "+(isTutor?"#85B7EB":"#e8e8e4"),borderRadius:12,padding:"11px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:13,fontWeight:500}}>{day}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {isTutor&&<span style={{fontSize:10,fontWeight:500,padding:"2px 7px",borderRadius:5,background:"#E6F1FB",color:"#0C447C",border:"0.5px solid #85B7EB"}}>tutoring</span>}
                      <span style={{fontSize:11,color:"#6b6b68"}}>{doneCount}/{blocks.length}</span>
                    </div>
                  </div>
                  {blocks.map((blk,i)=>{
                    const key=day+"-"+i; const done=!!doneTasks[key];
                    const bc=subjectColour(blk.s); const isBreak=blk.s==="Break";
                    return (
                      <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:4,paddingBottom:4,borderBottom:i<blocks.length-1?"0.5px solid #e8e8e4":"none",opacity:done?0.4:1}}>
                        <div style={{fontSize:10,color:"#6b6b68",minWidth:90,paddingTop:2,flexShrink:0}}>{blk.t}</div>
                        <div style={{flex:1}}>
                          {!isBreak&&<span style={{fontSize:10,fontWeight:500,padding:"1px 6px",borderRadius:4,background:bc.bg,color:bc.c,border:"0.5px solid "+bc.b,display:"inline-block",marginBottom:2}}>{blk.s}</span>}
                          <div style={{fontSize:12,color:isBreak?"#6b6b68":"#1a1a18",fontStyle:isBreak?"italic":"normal",lineHeight:1.5}}>{blk.task}</div>
                        </div>
                        {!isBreak&&<input type="checkbox" checked={done} onChange={()=>setDoneTasks(d=>({...d,[key]:!d[key]}))} style={{marginTop:2,flexShrink:0}}/>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {tab===1&&(
          <div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
              {["All","Maths","Further Maths","Computer Science"].map(f=><Chip key={f} label={f} active={ppFilter===f} onClick={()=>setPpFilter(f)}/>)}
              <button onClick={()=>setShowAdd(o=>!o)} style={{marginLeft:"auto",fontSize:11,padding:"4px 12px",borderRadius:6,border:"0.5px solid #185FA5",background:"#E6F1FB",color:"#0C447C",cursor:"pointer"}}>+ Add paper</button>
            </div>
            {showAdd&&<AddPaperModal onAdd={p=>{setCustomPapers(prev=>[...prev,p]);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
            {ppFilter==="All"&&<AllInsights allPapers={allPapers} paperData={paperData}/>}
            {ppFilter!=="All"&&(()=>{
              const papers=filtered.filter(p=>p.subject===ppFilter);
              const years=[...new Set(papers.map(p=>p.year))].sort((a,b)=>b-a);
              return (
                <div>
                  <div style={{fontSize:13,fontWeight:500,marginBottom:8,paddingBottom:5,borderBottom:"0.5px solid #e8e8e4"}}>{ppFilter}</div>
                  {years.map(year=><YearBlock key={year} year={year} subject={ppFilter} papers={papers.filter(p=>p.year===year)} paperData={paperData} onChange={updatePaper} onRemove={removePaper}/>)}
                </div>
              );
            })()}
          </div>
        )}

        {tab===2&&(
          <div>
            {weakRows.length===0?(
              <div style={{padding:"32px",textAlign:"center",color:"#6b6b68",fontSize:13,border:"0.5px solid #e8e8e4",borderRadius:12}}>
                No weak topics yet. In Past Papers, open a paper and type topics you got wrong.
              </div>
            ):(
              <div>
                <div style={{fontSize:11,color:"#6b6b68",marginBottom:10}}>{weakRows.length} topic{weakRows.length!==1?"s":""} logged</div>
                {weakRows.map(t=>{
                  const done=!!doneTopics[t.id];
                  return (
                    <div key={t.id} style={{background:"#ffffff",border:"0.5px solid "+(done?"#e8e8e4":"#AFA9EC"),borderRadius:10,padding:"10px 14px",marginBottom:6,opacity:done?0.5:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <input type="checkbox" checked={done} onChange={()=>setDoneTopics(d=>({...d,[t.id]:!d[t.id]}))}/>
                        <span style={{fontSize:13,fontWeight:500,textDecoration:done?"line-through":"none",flex:1}}>{t.name}</span>
                        <span style={{fontSize:10,color:"#6b6b68"}}>{t.subject} · {t.paper} {t.year}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
